map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;
    server_name ontiverosasociados.com.mx www.ontiverosasociados.com.mx;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name ontiverosasociados.com.mx www.ontiverosasociados.com.mx;

    ssl_certificate     /etc/letsencrypt/live/ontiverosasociados.com.mx/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ontiverosasociados.com.mx/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 50m;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri /index.html;
    }

    location /api/ {
        proxy_pass http://fastapi_app:8000/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /ws/ {
    proxy_pass http://fastapi_app:8000/;
    proxy_http_version 1.1;

    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;

    proxy_read_timeout 86400;
    }

    
}